<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BriefRooms — article brief</title>
  <meta name="description" content="A fuller article brief with context, summary and a link to the original source." />
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/site.css?v=en-brief-1" />
  <style>
    :root{--bg:#06131f;--line:rgba(255,255,255,.10);--txt:#eef7ff;--muted:#9fb2c8;--teal:#38d6c9;--teal2:#15978f;--shadow:0 24px 80px rgba(0,0,0,.38)}
    *{box-sizing:border-box}html{background:#06131f}body{margin:0;color:var(--txt);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(1000px 520px at 12% -10%,rgba(46,214,201,.18),transparent 58%),linear-gradient(180deg,#06131f 0%,#071827 70%,#081522 100%);min-height:100vh}.page{max-width:1020px;margin:0 auto;padding:28px 24px 42px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-bottom:22px;border-bottom:1px solid var(--line)}.logo{font-size:27px;line-height:1;font-weight:850;letter-spacing:-.03em;text-decoration:none;color:#fff}.back{border:1px solid var(--line);background:rgba(255,255,255,.035);color:#eaf6ff;border-radius:999px;min-height:40px;padding:0 16px;display:inline-flex;align-items:center;text-decoration:none;font-weight:800;font-size:13px}.card{margin-top:44px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border-radius:28px;overflow:hidden;box-shadow:var(--shadow)}.image{height:360px;background:radial-gradient(circle at 25% 15%,rgba(56,214,201,.32),transparent 40%),linear-gradient(135deg,#0d344a,#081827);position:relative;overflow:hidden}.image img{width:100%;height:100%;object-fit:cover;display:block}.image:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,19,31,.65) 100%)}.fallback{height:100%;display:grid;place-items:center;font-size:52px;font-weight:900;color:rgba(255,255,255,.65)}.body{padding:32px}.tag{display:inline-flex;border:1px solid rgba(56,214,201,.25);background:rgba(56,214,201,.10);color:#8ffff6;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;margin-bottom:18px}h1{font-size:clamp(34px,5vw,52px);line-height:1.06;letter-spacing:-.045em;margin:0 0 18px}.summary{font-size:20px;line-height:1.55;color:#c9d8e7;margin:0 0 24px}.brief-blocks{display:grid;gap:16px;margin:24px 0 28px}.brief-block{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);border-radius:18px;padding:18px 18px 17px}.brief-block h2{font-size:15px;letter-spacing:.04em;text-transform:uppercase;color:#8ffff6;margin:0 0 10px}.brief-block p{margin:0;color:#c9d8e7;font-size:16px;line-height:1.62}.brief-points{margin:0;padding-left:1.1rem;color:#c9d8e7;line-height:1.62;font-size:16px}.brief-points li+li{margin-top:8px}.meta{display:flex;gap:12px;flex-wrap:wrap;color:#91a6ba;font-size:14px;margin-bottom:28px}.cta{display:flex;gap:14px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;gap:10px;min-height:48px;padding:0 22px;border-radius:999px;text-decoration:none;font-weight:850;border:1px solid var(--line);background:rgba(255,255,255,.035);color:#eaf6ff}.btn.primary{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#042227;border-color:rgba(56,214,201,.45);box-shadow:0 18px 50px rgba(21,151,143,.28)}.note{margin-top:22px;color:#8fa4b8;font-size:13px;line-height:1.45}.empty{padding:46px;color:#c9d8e7}@media(max-width:680px){.page{padding:20px 14px 34px}.image{height:230px}.body{padding:22px}.summary{font-size:17px}.brief-block p,.brief-points{font-size:15px}}
  </style>
</head>
<body>
  <div class="page"><header class="top"><a class="logo" href="/en/">BRIEFROOMS</a><a class="back" href="/en/">← Home</a></header><main id="app" class="card"><div class="empty">Loading brief…</div></main></div>
<script>
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function art(category){return `<div class="fallback">${esc((category||'BR').slice(0,2).toUpperCase())}</div>`}
function getUrl(){return new URLSearchParams(location.search).get('u')||''}
function hostFromUrl(link){try{return new URL(link).hostname.replace('www.','')}catch(e){return 'Source'}}
function cleanSentence(text){text=String(text||'').replace(/\s+/g,' ').trim();if(!text)return '';return /[.!?…]$/.test(text)?text:text+'.';}
function makeBriefSections(item,link){const source=item.source||hostFromUrl(link);const category=item.category||'Brief';const title=item.title||'Article brief';const summary=cleanSentence(item.summary||item.why||'Open the source to read the full article.');const full=item.full_brief||item.details||'';const main=cleanSentence(full||summary);const context=`This item comes from the ${category} category and is based on the source publication: ${source}. The brief highlights the core meaning of the information, but it does not replace the full source text.`;const why=`In practice, check what the source actually confirms, when it was published, whether the item describes facts, announcements, data, opinions or forecasts, and whether the topic may be updated later.`;const next=`If the topic matters to you, open the full article and verify details: figures, quotes, institutional decisions, dates and any caveats from the author.`;return {source,category,title,summary,main,context,why,next};}
function render(item){const app=document.getElementById('app');const link=item.link||getUrl();const b=makeBriefSections(item,link);app.innerHTML=`<div class="image">${item.image?`<img src="${esc(item.image)}" alt="" referrerpolicy="no-referrer" onerror="this.closest('.image').innerHTML=art('${esc(b.category)}')">`:art(b.category)}</div><div class="body"><span class="tag">${esc(b.category)}</span><h1>${esc(b.title)}</h1><p class="summary">${esc(b.summary)}</p><div class="brief-blocks"><section class="brief-block"><h2>Core point</h2><p>${esc(b.main)}</p></section><section class="brief-block"><h2>Context</h2><p>${esc(b.context)}</p></section><section class="brief-block"><h2>What to check</h2><ul class="brief-points"><li>${esc(b.why)}</li><li>${esc(b.next)}</li></ul></section></div><div class="meta"><span>Source: <b>${esc(b.source)}</b></span><span>${esc(item.time||'today')}</span></div><div class="cta"><a class="btn primary" href="${esc(link)}" target="_blank" rel="noopener">Open source article ↗</a><a class="btn" href="/en/">Back to BriefRooms</a></div><p class="note">BriefRooms shows an editorial short brief, context and a link to the original publication. We do not pretend this is the full article — details should always be checked at the source.</p></div>`}
async function load(){const u=getUrl();try{const r=await fetch('/en/home_brief.json?v='+Date.now(),{cache:'no-store'});if(r.ok){const data=await r.json();const all=[...(data.latest||[]),...(data.radar||[])];const item=all.find(x=>String(x.link)===u);if(item){render(item);return;}}}catch(e){}render({title:'Article brief',summary:'This item was not found in the current home_brief.json file. You can still open the original source directly.',link:u,category:'Source',source:u?hostFromUrl(u):'Source'});}
load();
</script>
</body>
</html>
