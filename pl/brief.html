<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BriefRooms вҖ” brief artykuЕӮu</title>
  <meta name="description" content="Streszczenie artykuЕӮu z linkiem do oryginalnego ЕәrГіdЕӮa." />
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/site.css?v=brief11" />
  <style>
    :root{--bg:#06131f;--line:rgba(255,255,255,.10);--txt:#eef7ff;--muted:#9fb2c8;--teal:#38d6c9;--teal2:#15978f;--shadow:0 24px 80px rgba(0,0,0,.38)}
    *{box-sizing:border-box}html{background:#06131f}body{margin:0;color:var(--txt);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(1000px 520px at 12% -10%,rgba(46,214,201,.18),transparent 58%),linear-gradient(180deg,#06131f 0%,#071827 70%,#081522 100%);min-height:100vh}.page{max-width:1020px;margin:0 auto;padding:28px 24px 42px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-bottom:22px;border-bottom:1px solid var(--line)}.logo{font-size:27px;line-height:1;font-weight:850;letter-spacing:-.03em;text-decoration:none;color:#fff}.back{border:1px solid var(--line);background:rgba(255,255,255,.035);color:#eaf6ff;border-radius:999px;min-height:40px;padding:0 16px;display:inline-flex;align-items:center;text-decoration:none;font-weight:800;font-size:13px}.card{margin-top:44px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border-radius:28px;overflow:hidden;box-shadow:var(--shadow)}.image{height:360px;background:radial-gradient(circle at 25% 15%,rgba(56,214,201,.32),transparent 40%),linear-gradient(135deg,#0d344a,#081827);position:relative;overflow:hidden}.image img{width:100%;height:100%;object-fit:cover;display:block}.image:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,19,31,.65) 100%)}.fallback{height:100%;display:grid;place-items:center;font-size:52px;font-weight:900;color:rgba(255,255,255,.65)}.body{padding:32px}.tag{display:inline-flex;border:1px solid rgba(56,214,201,.25);background:rgba(56,214,201,.10);color:#8ffff6;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;margin-bottom:18px}h1{font-size:clamp(34px,5vw,52px);line-height:1.06;letter-spacing:-.045em;margin:0 0 24px}.brief-blocks{display:grid;gap:16px;margin:24px 0 28px}.brief-block{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);border-radius:18px;padding:18px 18px 17px}.brief-block h2{font-size:15px;letter-spacing:.04em;text-transform:uppercase;color:#8ffff6;margin:0 0 10px}.brief-block p{margin:0;color:#c9d8e7;font-size:16px;line-height:1.62}.meta{display:flex;gap:12px;flex-wrap:wrap;color:#91a6ba;font-size:14px;margin-bottom:28px}.cta{display:flex;gap:14px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;gap:10px;min-height:48px;padding:0 22px;border-radius:999px;text-decoration:none;font-weight:850;border:1px solid var(--line);background:rgba(255,255,255,.035);color:#eaf6ff}.btn.primary{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#042227;border-color:rgba(56,214,201,.45);box-shadow:0 18px 50px rgba(21,151,143,.28)}.empty{padding:46px;color:#c9d8e7}@media(max-width:680px){.page{padding:20px 14px 34px}.image{height:230px}.body{padding:22px}.brief-block p{font-size:15px}}
  </style>
</head>
<body>
  <div class="page">
    <header class="top"><a class="logo" href="/pl/">BRIEFROOMS</a><a class="back" href="/pl/">вҶҗ Strona gЕӮГіwna</a></header>
    <main id="app" class="card"><div class="empty">WczytujДҷ briefвҖҰ</div></main>
  </div>
<script>
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function art(category){return `<div class="fallback">${esc((category||'BR').slice(0,2).toUpperCase())}</div>`}
function getUrl(){return new URLSearchParams(location.search).get('u')||''}
function hostFromUrl(link){try{return new URL(link).hostname.replace('www.','')}catch(e){return 'Е№rГіdЕӮo'}}
function repairMojibake(text){
  let s=String(text||'');
  const map={'Г…ВӮ':'ЕӮ','Г…ВҒ':'ЕҒ','Г…Вј':'Еј','Г…В»':'Е»','Г…Вә':'Еә','Г…В№':'Е№','Г…Вӣ':'Еӣ','Г…ЕЎ':'Еҡ','Г…вҖһ':'Е„','Г…Вғ':'Е„','ГғВі':'Гі','ГғВ“':'Г“','Г„Вҷ':'Дҷ','Г„Вҳ':'Дҳ','Г„вҖҰ':'Д…','Г„вҖһ':'Д„','Г„ВҮ':'ДҮ','Г„ВҶ':'ДҶ','ГўВҖВ“':'вҖ“','ГўВҖВ”':'вҖ”','ГўВҖВһ':'вҖһ','ГўВҖВқ':'вҖқ','ГўВҖВң':'вҖң','ГўВҖВҷ':'вҖҷ','ГӮ':''};
  Object.keys(map).forEach(k=>{s=s.split(k).join(map[k]);});
  return s;
}
function normalizeText(text){return repairMojibake(text).replace(/\s+/g,' ').replace(/\s+-\s+TVN24\b/gi,'').replace(/\s+-\s+[^.!?]{2,35}$/,'').trim();}
function brokenPolish(text){
  const s=' '+normalizeText(text).toLowerCase()+' ';
  const bad=[/\bwygl da\b/,/\bsamolot zatrzyma si\b/,/\bwy cznie\b/,/\bw rod\b/,/\bpoinformowa\b/,/\bwyl dowaniu\b/,/\bznajdowa si\b/,/\bju wcze?niej\b/,/\bkatarczyk\w*\b/,/\bzaznaczy, e\b/,/\bzostaa\b/,/\bwysana\b/,/\bzgodnie z prob\b/,/\bcaej\b/,/\bza czam\b/,/\bzdjcie\b/,/\bprzesiad si\b/,/\bpokadzie\b/,/\bktrej\b/,/\bwrci\b/,/\bstanw\b/,/\brdo\b/,/\bmoliwo\b/,/\boperacj\b/,/\bprzewodnicz cy\b/,/\bwyjani\b/,/\bzagraaj cym\b/,/\byciu\b/,/\bdziaania\b/,/\burzd\w*\b/,/\bpoudniow\w*\b/,/\bledztw\w*\b/,/\bkonkretw\b/,/\bprojektw\b/,/\baktw\b/,/\bcaociow\w*\b/,/\bzupenie\b/,/\bwiadcze\b/,/\bmo liwo\b/,/\btumaczy\b/,/\brnych\b/,/\bdostpn\w*\b/];
  const hits=bad.filter(r=>r.test(s)).length;
  const noPolishMarks=(s.length>180 && !/[Д…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]/i.test(s));
  return hits>=1 || noPolishMarks;
}
function cleanSentence(text){text=normalizeText(text);if(!text||brokenPolish(text))return '';return /[.!?вҖҰ]$/.test(text)?text:text+'.';}
function splitSentences(text){if(brokenPolish(text))return [];return normalizeText(text).replace(/вҖҰ/g,'.').match(/[^.!?]+[.!?]+|[^.!?]+$/g)?.map(s=>cleanSentence(s)).filter(Boolean)||[];}
function hasLogicalStart(s){return /^[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»0-9вҖһ"'вҖҷ]/.test(s)&&!/^(zЕӮ\b|tys\.\b|mln\b|mld\b|proc\.\b|usd\b|eur\b|pln\b|[.,;:!?%вҖ°/\\)\]}]|za\b|dla\b|oraz\b|a\b|i\b|dodaЕӮ\b|dodaЕӮa\b|zaznaczyЕӮ\b|zaznaczyЕӮa\b|powiedziaЕӮ\b|powiedziaЕӮa\b|stwierdziЕӮ\b|stwierdziЕӮa\b|wskazaЕӮ\b|wskazaЕӮa\b|skomentuj\b|skomentowaЕӮ\b|skomentowaЕӮa\b|powiedz\b|napisz\b)/i.test(s)}
function usefulSentence(s){
  const low=s.toLowerCase();
  return s.length>=45 && hasLogicalStart(s) && !brokenPolish(s) &&
    !low.includes('briefrooms') && !low.includes('peЕӮnego tekstu ЕәrГіdЕӮowego') && !low.includes('publikacja ЕәrГіdЕӮowa') &&
    !low.includes('otwГіrz peЕӮny artykuЕӮ') && !low.includes('w praktyce warto') && !low.includes('artykuЕӮ dotyczy tematu') &&
    !low.includes('najwaЕјniejszy sygnaЕӮ z materiaЕӮu') && !low.includes('najwaЕјniejszy kontekst mieЕӣci siДҷ') &&
    !low.includes('ЕәrГіdЕӮem wpisu jest') && !low.includes('peЕӮne tЕӮo i szczegГіЕӮy') && !low.includes('skomentuj') &&
    !low.includes('fotonews') && !low.includes('grzegorz krzyЕјewski') && !low.includes('wysЕӮaliЕӣmy wstДҷpne zapytania') &&
    !low.includes('czytaj takЕјe') && !low.includes('zobacz takЕјe') &&
    !/(Г…|Г„|Гғ|ГӮ|ГўВҖ|rz du|mwi|m wi|koz w|niektrz|take nie|obowi zek|rozwi za|dotycz cych|wiadcze|p ac|ochron zdrowia|pokЕӮosie ultimatum postawionego)/i.test(s);
}
function uniqueSentences(list){const seen=new Set();const out=[];for(const s of list){const k=s.toLowerCase().replace(/\W+/g,'').slice(0,90);if(k&&!seen.has(k)){seen.add(k);out.push(s)}}return out;}
function cleanArticleComment(text){if(brokenPolish(text))return '';const s=uniqueSentences(splitSentences(text||'').filter(usefulSentence));return s.length>=3?s.slice(0,6).join(' '):'';}
function approvedComment(item){const text=normalizeText(item.full_brief||item.details||'');const count=(text.replace(/вҖҰ/g,'.').match(/[^.!?]+[.!?]+/g)||[]).length;return String(item.comment_quality_status||'').startsWith('passed_')&&count>=3&&count<=6?text:'';}
function buildSummary(item){return approvedComment(item)||'Ten wpis nie ma zatwierdzonego komentarza i nie powinien byДҮ widoczny jako karta BriefRooms.';}
function visibleCategory(cat){const c=repairMojibake(cat||'Brief');return /^(pilne|breaking|urgent|alert)$/i.test(c)?'AktualnoЕӣci':c;}
function makeBriefSections(item,link){
  const source=repairMojibake(item.source||hostFromUrl(link));
  const category=visibleCategory(item.category||'Brief');
  const title=repairMojibake(item.title||'Brief artykuЕӮu');
  const main=buildSummary(item);
  return {source,category,title,main};
}
function render(item){
  const app=document.getElementById('app');
  const link=item.link||getUrl();
  const b=makeBriefSections(item,link);
  app.innerHTML=`<div class="image">${item.image?`<img src="${esc(item.image)}" alt="" referrerpolicy="no-referrer" onerror="this.closest('.image').innerHTML=art('${esc(b.category)}')">`:art(b.category)}</div><div class="body"><span class="tag">${esc(b.category)}</span><h1>${esc(b.title)}</h1><div class="brief-blocks"><section class="brief-block"><h2>Sedno sprawy</h2><p>${esc(b.main)}</p></section></div><div class="meta"><span>Е№rГіdЕӮo: <b>${esc(b.source)}</b></span><span>${esc(item.time||'dzisiaj')}</span></div><div class="cta"><a class="btn primary" href="${esc(link)}" target="_blank" rel="noopener">OtwГіrz artykuЕӮ ЕәrГіdЕӮowy вҶ—</a><a class="btn" href="/pl/">WrГіДҮ do BriefRooms</a></div></div>`
}
async function load(){const u=getUrl();try{const r=await fetch('/pl/home_brief.json?v='+Date.now(),{cache:'no-store'});if(r.ok){const data=await r.json();const all=[...(data.latest||[]),...(data.radar||[])];const item=all.find(x=>String(x.link)===u);if(item){render(item);return;}}}catch(e){}render({title:'Brief artykuЕӮu',summary:'Nie znaleziono tego wpisu w aktualnym pliku home_brief.json.',link:u,category:'Е№rГіdЕӮo',source:u?hostFromUrl(u):'Е№rГіdЕӮo'});}
load();
</script>
</body>
</html>
