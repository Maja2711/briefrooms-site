name: Update Hot X Topics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6,18 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/update_hot_x_2x_daily.py"
      - "scripts/build_hot_x_en.py"
      - "scripts/update_hot_x_topics.py"
      - "scripts/translate_hot_x_pl.py"
      - "scripts/validate_hot_x_comments.py"
      - "scripts/patch_hot_x_loader.py"
      - "scripts/hot-x-render.js"
      - "data/hot_x_emergency.json"
      - ".github/workflows/hot-x-topics.yml"

permissions:
  contents: write

concurrency:
  group: content-publishing
  cancel-in-progress: false

jobs:
  update-hot-x-topics:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/validate_hot_x_comments.py --backup
        continue-on-error: true
      - env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_MODEL: gpt-4o-mini
        run: python scripts/update_hot_x_2x_daily.py
        continue-on-error: true
      - run: python scripts/translate_hot_x_pl.py
        continue-on-error: true
      - if: always()
        run: python scripts/validate_hot_x_comments.py --validate
      - if: always()
        run: python scripts/patch_hot_x_loader.py
        continue-on-error: true
      - if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hot_tweets.json .cache pl/index.html en/index.html || true
          if git diff --cached --quiet; then
            echo "No Hot X changes to commit."
          else
            git commit -m "Update Hot X topics"
            git pull --rebase origin main
            git push
          fi
