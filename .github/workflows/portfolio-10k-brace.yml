name: Review BRACE Challenger

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "BRACE run mode"
        required: true
        default: "full"
        type: choice
        options:
          - review
          - backtest
          - full
  schedule:
    # Runs after the baseline Sunday portfolio review.
    - cron: "40 7 * * 0"
  push:
    branches: [main]
    paths:
      - "scripts/portfolio_10k_brace*.py"
      - "scripts/portfolio-10k-brace-public.js"
      - "tests/test_portfolio_10k_brace*.py"
      - ".github/workflows/portfolio-10k-brace.yml"

permissions:
  contents: write

concurrency:
  group: portfolio-10k-brace
  cancel-in-progress: false

jobs:
  validate-and-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip yfinance pandas numpy pytest

      - name: Validate BRACE and existing portfolio tests
        run: python -m pytest -q tests/test_portfolio_10k*.py

      - name: Validate public JavaScript
        run: node --check scripts/portfolio-10k-brace-public.js

      - name: Build live BRACE challenger snapshot
        if: github.event_name != 'push' && (github.event_name == 'schedule' || inputs.mode == 'review' || inputs.mode == 'full')
        run: python scripts/portfolio_10k_brace.py

      - name: Run no-lookahead BRACE-Lite backtest
        if: github.event_name != 'push' && (github.event_name == 'schedule' || inputs.mode == 'backtest' || inputs.mode == 'full')
        run: python scripts/portfolio_10k_brace_backtest.py

      - name: Commit transparent BRACE outputs
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/portfolio_10k_brace.json data/investments/portfolio_10k_brace_backtest.json
          if git diff --cached --quiet; then
            echo "No BRACE data changes to commit."
          else
            git commit -m "Update BRACE challenger review"
            git pull --rebase origin main
            git push
          fi
