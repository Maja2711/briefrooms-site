name: Build Investments Weekly Forecasts

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - forecast
          - open
          - close
          - render
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  build-investments-weekly:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install market data dependency
        run: python -m pip install --upgrade pip yfinance

      - name: Build weekly investment data internally
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'auto' }}
        run: python scripts/investments_weekly.py --mode "$MODE"

      - name: Normalize SL TP exits globally
        run: python scripts/normalize_sl_tp_exits.py || true

      - name: Intraweek re-entry after stop loss
        run: python scripts/investments_reentry_engine.py || true

      - name: Render simple public investment pages
        run: python scripts/render_simple_investments.py

      - name: Commit generated investment updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/live_prices.json data/investments/weekly data/investments/reentry_report.json pl/inwestycje/prognozy-tygodniowe.html en/investing/weekly-forecasts.html
          if git diff --cached --quiet; then
            echo "No investment forecast changes to commit."
          else
            git commit -m "Update weekly investments forecasts"
            git push
          fi
