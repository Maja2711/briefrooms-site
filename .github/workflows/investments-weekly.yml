name: Build Governed Investments Weekly Forecasts

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "auto"
        type: choice
        options: [auto, forecast, close, ensure-exposure, render]
  schedule:
    - cron: "17 * * * *"
  push:
    branches: [main]
    paths:
      - "scripts/investments_weekly*.py"
      - "scripts/daily_position_review.py"
      - "scripts/apply_instrument_validation_gate.py"
      - "scripts/backtest_weekly_execution_parity_v5.py"
      - "scripts/render_weekly_public_pages.py"
      - "scripts/render_simple_investments.py"
      - "scripts/investments-weekly-public.js"
      - "scripts/investments-weekly-governance.js"
      - "tests/test_investments_weekly*.py"
      - "tests/test_investments_weekly_public.js"
      - "data/investments/methodology.json"
      - "data/investments/multi_instrument_exposure_policy.json"
      - "data/investments/daily_review_policy.json"
      - ".github/workflows/investments-weekly.yml"

permissions:
  contents: write

concurrency:
  group: investments-paper-publishing
  cancel-in-progress: false

jobs:
  build-investments-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install market-data dependencies
        run: python -m pip install --upgrade pip yfinance pandas numpy

      - name: Validate public scripts
        run: |
          node --check scripts/investments-weekly-public.js
          node --check scripts/investments-weekly-governance.js
          node --test tests/test_investments_weekly_public.js

      - name: Test governed weekly rules
        run: |
          python -m unittest tests/test_investments_weekly_v4.py
          python -m unittest tests/test_investments_weekly_v5.py

      - name: Recover missing current-week forecast
        run: python scripts/ensure_current_week_forecast.py

      - name: Apply shared validation gate before any new entry
        run: python scripts/apply_instrument_validation_gate.py

      - name: Run governed weekly model v5
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'auto' }}
        run: python scripts/investments_weekly_v5.py --mode "$MODE"

      - name: Once-daily thesis review and conditional close
        run: python scripts/daily_position_review.py

      - name: Re-evaluate exposure with locks and NO_TRADE
        run: python scripts/investments_weekly_v5.py --mode ensure-exposure

      - name: Re-apply shared validation gate as defense in depth
        run: python scripts/apply_instrument_validation_gate.py

      - name: Audit model integrity and closed history
        run: python scripts/audit_weekly_model.py

      - name: Run scheduled base-model validation
        env:
          FORCE_BACKTEST: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: python scripts/backtest_weekly_model_v2.py

      - name: Validate candidate methods separately
        run: python scripts/backtest_multi_strategy_v4.py

      - name: Replay exact published execution ledger
        run: python scripts/backtest_weekly_execution_parity_v5.py

      - name: Render Polish and English public pages
        run: python scripts/render_simple_investments.py

      - name: Commit validated weekly updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/live_prices.json \
                  data/investments/weekly \
                  data/investments/daily_review_report.json \
                  data/investments/event_exit_requests.json \
                  data/investments/model_audit.json \
                  data/investments/closed_week_manifest.json \
                  data/investments/model_validation_v2.json \
                  data/investments/multi_instrument_exposure_state_v5.json \
                  data/investments/multi_instrument_exposure_report_v5.json \
                  data/investments/multi_instrument_validation_v4.json \
                  data/investments/weekly_execution_parity_v5.json \
                  pl/inwestycje/prognozy-tygodniowe.html \
                  en/investing/weekly-forecasts.html
          if git diff --cached --quiet; then
            echo "No governed weekly changes to commit."
          else
            git commit -m "Update governed weekly investments forecasts"
            git pull --rebase origin main
            git push
          fi
