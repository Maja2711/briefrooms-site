name: Update Investment Room Quotes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_investment_room_quotes.py"
      - "scripts/update_investment_room_quotes_v2.py"
      - ".github/workflows/investment-room-quotes.yml"
  schedule:
    # Avoid the busiest quarter-hour boundaries, where GitHub may delay schedules.
    - cron: "3,18,33,48 * * * *"

permissions:
  contents: write

concurrency:
  group: investment-room-quotes
  cancel-in-progress: false

jobs:
  update-investment-room-quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency
        run: python -m pip install --upgrade pip yfinance

      - name: Update investment room quotes
        run: python scripts/update_investment_room_quotes_v2.py

      - name: Commit investment room quotes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/live_prices.json data/investments/room_quotes.json
          if git diff --cached --quiet; then
            echo "No investment room quote changes"
          else
            git commit -m "Update investment room quotes"
            git pull --rebase origin main
            git push
          fi
