name: Build EN News (12x daily)

on:
  schedule:
    - cron: "10 */2 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/fetch_news_en.py"
      - "scripts/fetch_news_en_context.py"
      - ".github/workflows/news-en.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser python-dateutil requests

      - name: Generate EN News
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_MODEL: gpt-4o-mini
        run: |
          python scripts/fetch_news_en_context.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add en/news.html assets/hotbar-en.json
          if git diff --cached --quiet; then
            echo "No EN news changes to commit."
          else
            git commit -m "Update EN news"
            git push
          fi
