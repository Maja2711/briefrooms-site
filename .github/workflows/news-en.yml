name: Build EN News (6x daily)

on:
  schedule:
    - cron: "40 */4 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/fetch_news_en.py"
      - "scripts/fetch_news_en_context.py"
      - "scripts/read_and_summarize_articles.py"
      - "scripts/newsroom_articles.py"
      - "scripts/newsroom_style.py"
      - "scripts/news_story_dedupe.py"
      - "scripts/comment_quality.py"
      - "scripts/en-news-thumbs.js"
      - "scripts/add_en_news_hook.py"
      - "tests/test_comment_quality.py"
      - "tests/test_fetch_news_en.py"
      - ".github/workflows/news-en.yml"

permissions:
  contents: write
  models: read

concurrency:
  group: news-en-publishing
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync latest main before generation
        run: git pull --ff-only origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser python-dateutil requests

      - name: Test strict PL and EN comment contract
        run: python -m unittest discover -s tests -p "test_comment_quality.py"

      - name: Test EN news builder
        run: python -m unittest tests.test_fetch_news_en tests.test_news_story_dedupe -v

      - name: Generate EN News with homepage-grade full-article comments
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_MODEL: gpt-4o-mini
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: openai/gpt-4o-mini
          GITHUB_MODELS_REVIEW_MODEL: openai/gpt-4.1-mini
          GITHUB_MODELS_MIN_INTERVAL_SECONDS: "4.2"
          BR_NEWS_PERSIST_HISTORY: "1"
        run: |
          python scripts/fetch_news_en_context.py
          python scripts/add_en_news_hook.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main:refs/remotes/origin/main
          if ! git diff --quiet HEAD..origin/main -- .github/workflows/news-en.yml scripts/fetch_news_en.py scripts/fetch_news_en_context.py scripts/news_story_dedupe.py scripts/read_and_summarize_articles.py scripts/newsroom_articles.py scripts/newsroom_style.py scripts/comment_quality.py tests/test_comment_quality.py tests/test_fetch_news_en.py tests/test_news_story_dedupe.py; then
            echo "Skip stale publish because generator code changed on main."
            exit 0
          fi
          if [[ -n "$(git status --porcelain en/news.html data/news_story_history_en.json .cache)" ]]; then
            git add en/news.html data/news_story_history_en.json .cache
            git commit -m "chore(news-en): publish homepage-grade EN news"
            git pull --rebase -X theirs origin main
            git push
          else
            echo "No EN news changes to commit."
          fi
