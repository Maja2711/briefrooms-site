name: Diagnose 10K Model Entry

on:
  workflow_dispatch:
    inputs:
      date:
        description: "UTC session date (YYYY-MM-DD)"
        required: true
        default: "2026-07-17"
  push:
    branches: [main]
    paths:
      - "scripts/portfolio_10k_entry_diagnostic.py"
      - "tests/test_portfolio_10k_execution.py"
      - ".github/workflows/portfolio-10k-entry-diagnostic.yml"

permissions:
  contents: write

concurrency:
  group: portfolio-10k-entry-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip yfinance pandas numpy pytest

      - name: Validate execution rules
        run: python -m pytest -q tests/test_portfolio_10k_execution.py tests/test_portfolio_10k_runtime.py

      - name: Reconstruct declared entry data without opening positions
        env:
          TARGET_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.date || '2026-07-17' }}
        run: python scripts/portfolio_10k_entry_diagnostic.py --date "$TARGET_DATE"

      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/portfolio_10k_entry_diagnostic.json
          if git diff --cached --quiet; then
            echo "Diagnostic report already current."
          else
            git commit -m "Publish 10K entry diagnostic"
            git pull --rebase origin main
            git push
          fi
