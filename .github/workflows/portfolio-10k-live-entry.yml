name: Open Fresh 10K Positions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/portfolio_10k_open_live_now.py"
      - ".github/workflows/portfolio-10k-live-entry.yml"
  schedule:
    # Complete any still-pending European positions during the common session.
    - cron: "50 14 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "10 15 * * 1-5"

permissions:
  contents: write

concurrency:
  group: portfolio-10k-live-entry
  cancel-in-progress: false

jobs:
  staged-entry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip yfinance pandas numpy

      - name: Open only positions with fresh tradable quotes
        run: python scripts/portfolio_10k_open_live_now.py

      - name: Commit staged entry data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/portfolio_10k.json
          if git diff --cached --quiet; then
            echo "No new live entries."
          else
            git commit -m "Open fresh 10K portfolio positions"
            git pull --rebase origin main
            git push
          fi
