name: BRACE-SPX Validation Diagnostic

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, 'BRACE-SPX diagnose')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: brace-spx-research
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip numpy pandas yfinance scikit-learn pytest

      - name: Run validation files independently
        run: |
          set +e
          mkdir -p data/research/brace_spx_validation_diagnostics
          summary="data/research/brace_spx_validation_diagnostics/summary.tsv"
          : > "$summary"
          for test_file in \
            tests/test_brace_spx_generation_research.py \
            tests/test_brace_spx_research_controls.py \
            tests/test_brace_spx_selection_audit.py \
            tests/test_brace_spx_statistical_governance.py
          do
            name="$(basename "$test_file" .py)"
            log="data/research/brace_spx_validation_diagnostics/${name}.log"
            python -m pytest -q "$test_file" >"$log" 2>&1
            code=$?
            printf '%s\t%s\n' "$name" "$code" >> "$summary"
          done
          python -m py_compile \
            scripts/brace_spx_research.py \
            scripts/brace_spx_generation_research.py \
            scripts/brace_spx_research_controls.py \
            scripts/brace_spx_selection_audit.py \
            scripts/brace_spx_statistical_governance.py \
            > data/research/brace_spx_validation_diagnostics/py_compile.log 2>&1
          printf 'py_compile\t%s\n' "$?" >> "$summary"
          exit 0

      - name: Persist diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/research/brace_spx_validation_diagnostics
          git commit -m "Record BRACE-SPX validation diagnostics"
          git fetch origin brace-spx-research
          git rebase origin/brace-spx-research
          git push origin HEAD:brace-spx-research
