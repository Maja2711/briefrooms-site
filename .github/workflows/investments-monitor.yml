name: Build Investments Intraweek Monitor

on:
  workflow_dispatch:
  schedule:
    # Tuesday-Friday model log refresh, around 10:05, 14:05 and 18:05 Europe/Warsaw.
    - cron: "5 8,12,16 * 4-10 2-5"
    - cron: "5 9,13,17 * 11,12,1-3 2-5"

permissions:
  contents: write

jobs:
  build-investments-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install market data dependency
        run: python -m pip install --upgrade pip yfinance

      - name: Review weekly model log
        run: python scripts/investments_monitor.py

      - name: Commit generated monitor updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/weekly pl/inwestycje/prognozy-tygodniowe.html en/investing/weekly-forecasts.html
          if git diff --cached --quiet; then
            echo "No monitor changes to commit."
          else
            git commit -m "Update investments model log"
            git push
          fi
