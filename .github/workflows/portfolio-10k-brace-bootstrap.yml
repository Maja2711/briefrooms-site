name: Bootstrap BRACE 2.0 Learning

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/portfolio-10k-brace-bootstrap.yml"

permissions:
  contents: write

concurrency:
  group: portfolio-10k-brace-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip yfinance pandas numpy pytest

      - name: Validate complete 10K model suite
        run: python -m pytest -q tests/test_portfolio_10k*.py

      - name: Validate BRACE public JavaScript
        run: node --check scripts/portfolio-10k-brace-public.js

      - name: Refresh live BRACE snapshot
        run: python scripts/portfolio_10k_brace.py

      - name: Build immutable memory and adaptive evidence learning
        run: python scripts/portfolio_10k_brace_learning_runtime.py

      - name: Refresh long-history no-look-ahead BRACE-Lite backtest
        run: python scripts/portfolio_10k_brace_backtest.py

      - name: Apply champion-challenger promotion gate
        run: python scripts/portfolio_10k_brace_promotion.py

      - name: Commit refreshed BRACE data memory and verdict
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/portfolio_10k_brace.json data/investments/portfolio_10k_brace_backtest.json data/investments/portfolio_10k_brace_memory.json
          if git diff --cached --quiet; then
            echo "BRACE outputs already current."
          else
            git commit -m "Bootstrap BRACE 2.0 learning memory"
            git pull --rebase origin main
            git push
          fi
