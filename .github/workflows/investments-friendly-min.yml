name: Build Friendly Investments Pages

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "render"
        type: choice
        options:
          - auto
          - forecast
          - open
          - close
          - render
  schedule:
    # Offset from quote updates so both jobs do not compete for main at once.
    - cron: "8,23,38,53 * * * *"

permissions:
  contents: write

concurrency:
  group: investment-weekly-pages
  cancel-in-progress: false

jobs:
  build-friendly-investments:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency
        run: python -m pip install --upgrade pip yfinance

      - name: Update macro data
        run: python scripts/investments_macro_monitor.py || true

      - name: Update EURUSD MA research
        run: python scripts/eurusd_ma_timeframe_research.py || true

      - name: Update market factor research
        run: python scripts/market_factor_research.py || true

      - name: Update model data
        run: python scripts/investments_advanced_learning.py || true

      - name: Internal scenario grade engine
        run: python scripts/scenario_grade_engine.py || python scripts/grade_engine.py || true

      - name: Build internal investment data
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'render' }}
        run: python scripts/investments_friendly_min.py --mode "$MODE"

      - name: Normalize SL TP exits globally
        run: python scripts/normalize_sl_tp_exits.py || true

      - name: Intraweek re-entry after stop loss
        run: python scripts/investments_reentry_engine.py || true

      - name: Build internal data after re-entry
        env:
          MODE: render
        run: python scripts/investments_friendly_min.py --mode "$MODE"

      - name: Normalize SL TP exits after re-entry
        run: python scripts/normalize_sl_tp_exits.py || true

      - name: Render simple public investment pages
        run: python scripts/render_simple_investments.py

      - name: Commit investment updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # live_prices.json is owned exclusively by investment-room-quotes.yml.
          # Discard the local model copy to prevent two workflows racing on one file.
          git restore data/investments/live_prices.json
          git add data/investments/weekly data/investments/learning data/investments/macro_events.json data/investments/scenario_grades.json data/investments/reentry_report.json pl/inwestycje/prognozy-tygodniowe.html en/investing/weekly-forecasts.html
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update investment pages"
            git pull --rebase origin main
            git push
          fi
