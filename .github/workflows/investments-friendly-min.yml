name: Build Friendly Investments Pages

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "render"
        type: choice
        options:
          - auto
          - forecast
          - open
          - close
          - render
  schedule:
    - cron: "31 * * * *"

permissions:
  contents: write

jobs:
  build-friendly-investments:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependency
        run: python -m pip install --upgrade pip yfinance
      - name: Update macro data
        run: python scripts/investments_macro_monitor.py || true
      - name: Update market factor research
        run: python scripts/market_factor_research.py || true
      - name: Update model data
        run: python scripts/investments_advanced_learning.py || true
      - name: Build pages
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'render' }}
        run: python scripts/investments_friendly_min.py --mode "$MODE"
      - name: Commit pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/live_prices.json data/investments/weekly data/investments/learning data/investments/macro_events.json pl/inwestycje/prognozy-tygodniowe.html en/investing/weekly-forecasts.html
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update pages"
            git push
          fi
