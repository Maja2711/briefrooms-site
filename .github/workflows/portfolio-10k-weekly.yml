name: Update 10K Model Portfolio

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Portfolio run mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - initialize
          - review
  schedule:
    - cron: "20 6 * * 0"
  push:
    branches: [main]
    paths:
      - "scripts/portfolio_10k_weekly.py"
      - "scripts/portfolio_10k_weekly_v2.py"
      - "scripts/portfolio-10k-public.js"
      - "tests/test_portfolio_10k.py"
      - "tests/test_portfolio_10k_v2.py"
      - ".github/workflows/portfolio-10k-weekly.yml"

permissions:
  contents: write

concurrency:
  group: portfolio-10k-weekly
  cancel-in-progress: false

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip yfinance pandas numpy pytest

      - name: Validate model code and allocation
        run: python -m pytest -q tests/test_portfolio_10k.py tests/test_portfolio_10k_v2.py

      - name: Initialize or review portfolio
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'auto' }}
        run: python scripts/portfolio_10k_weekly_v2.py --mode "$MODE"

      - name: Commit transparent portfolio update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/portfolio_10k.json
          if git diff --cached --quiet; then
            echo "No portfolio changes to commit."
          else
            git commit -m "Update 10K model portfolio"
            git pull --rebase origin main
            git push
          fi
