name: Update 10K Model Portfolio

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Portfolio run mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - initialize
          - review
          - migrate
  schedule:
    # Several attempts during the common US-European cash-market window.
    # Repeated attempts protect the launch against delayed or temporarily missing
    # Yahoo Finance 5-minute and FX bars. Once the portfolio is active, later runs
    # become harmless no-op checks.
    - cron: "50 14 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "10 15 * * 1-5"
    - cron: "20 15 * * 1-5"
    # Full fundamental/market review once per week.
    - cron: "20 6 * * 0"
  push:
    branches: [main]
    paths:
      - "scripts/portfolio_10k_weekly.py"
      - "scripts/portfolio_10k_weekly_v2.py"
      - "scripts/portfolio_10k_weekly_v3.py"
      - "scripts/portfolio_10k_runtime.py"
      - "scripts/portfolio_10k_news_quality.py"
      - "scripts/portfolio-10k-public.js"
      - "tests/test_portfolio_10k.py"
      - "tests/test_portfolio_10k_v2.py"
      - "tests/test_portfolio_10k_execution.py"
      - "tests/test_portfolio_10k_runtime.py"
      - "tests/test_portfolio_10k_news_quality.py"
      - ".github/workflows/portfolio-10k-weekly.yml"

permissions:
  contents: write

concurrency:
  group: portfolio-10k-weekly
  cancel-in-progress: false

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip yfinance pandas numpy pytest

      - name: Validate model code and allocation
        run: python -m pytest -q tests/test_portfolio_10k.py tests/test_portfolio_10k_v2.py tests/test_portfolio_10k_execution.py tests/test_portfolio_10k_runtime.py tests/test_portfolio_10k_news_quality.py

      - name: Migrate, initialize or review portfolio
        id: portfolio_run
        continue-on-error: true
        env:
          MODE: ${{ github.event_name == 'push' && 'migrate' || (github.event_name == 'workflow_dispatch' && inputs.mode || 'auto') }}
        run: python scripts/portfolio_10k_runtime.py --mode "$MODE"

      - name: Filter duplicate and irrelevant headlines
        if: github.event_name != 'push' && steps.portfolio_run.outcome == 'success'
        run: python scripts/portfolio_10k_news_quality.py

      - name: Commit transparent portfolio update or error state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/portfolio_10k.json
          if git diff --cached --quiet; then
            echo "No portfolio changes to commit."
          else
            git commit -m "Update 10K model portfolio"
            git pull --rebase origin main
            git push
          fi

      - name: Fail workflow after publishing diagnostic state
        if: steps.portfolio_run.outcome == 'failure'
        run: |
          echo "Portfolio run failed. The diagnostic state was committed to portfolio_10k.json."
          exit 1
