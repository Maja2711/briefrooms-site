name: Static Quality Guard

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/fix_static_quality.py"
      - ".github/workflows/static-quality-fix.yml"

permissions:
  contents: write

jobs:
  fix-static-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run static quality guard
        run: python scripts/fix_static_quality.py

      - name: Commit static quality fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add en/news.html pl/aktualnosci.html en/index.html pl/index.html || true
          if git diff --cached --quiet; then
            echo "No static quality fixes to commit."
          else
            git commit -m "fix(site): apply static quality guard"
            git pull --rebase origin main
            git push
          fi
