name: Update Hot X Topics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

jobs:
  update-hot-x-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update Hot X topics with matched images
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python scripts/build_hot_x_en.py

      - name: Commit Hot X topics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hot_tweets.json
          if git diff --cached --quiet; then
            echo "No Hot X changes"
          else
            git commit -m "Update Hot X topics"
            git push
          fi
