name: Update Hot X Topics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/hot_tweets.json"
      - "scripts/hot-x-render.js"
      - ".github/workflows/hot-x-topics.yml"

permissions:
  contents: read

jobs:
  hot-x-curated-mode:
    runs-on: ubuntu-latest
    steps:
      - name: Curated Hot X mode
        run: |
          echo "Hot X is curated manually in data/hot_tweets.json."
          echo "This workflow no longer overwrites selected X links or editorial descriptions."
