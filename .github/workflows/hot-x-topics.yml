name: Apply and Verify Hot X Editorial Topics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/apply_hot_x_editorial_patch.py"
      - "data/hot-x-editorial-patch/**"
      - ".github/workflows/hot-x-topics.yml"

permissions:
  contents: write

concurrency:
  group: content-publishing
  cancel-in-progress: false

jobs:
  apply-hot-x-editorial-topics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Expand four editorial Hot X topics
        run: python scripts/apply_hot_x_editorial_patch.py

      - name: Compile and test Hot X implementation
        run: |
          python -m py_compile scripts/hot_x_items.py scripts/update_hot_x_2x_daily.py scripts/patch_hot_x_loader.py
          python -m unittest tests/test_hot_x_items.py
          node --check scripts/hot-x-render.js
          node tests/test_hot_x_render.js

      - name: Patch PL and EN loaders
        run: python scripts/patch_hot_x_loader.py

      - name: Verify bilingual pinned feed
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          pins = json.loads(Path('data/hot_x_editorial_pins.json').read_text(encoding='utf-8'))['items']
          feed = json.loads(Path('data/hot_tweets.json').read_text(encoding='utf-8'))['items']
          assert len(pins) == 4
          assert [x['search_url'] for x in feed[:4]] == [x['search_url'] for x in pins]
          assert all(x.get('editorial_pin') is True and x.get('link_kind') == 'x_search' for x in pins)
          assert all(x.get('title_pl') and x.get('title_en') and x.get('comment_pl') and x.get('comment_en') for x in pins)
          for page in ('pl/index.html', 'en/index.html'):
              text = Path(page).read_text(encoding='utf-8')
              assert '/scripts/hot-x-render.js?v=editorial-x-searches-2' in text
          PY

      - name: Commit verified Hot X topics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Pin four editorial topics in Hot X"
          git pull --rebase origin main
          git push
