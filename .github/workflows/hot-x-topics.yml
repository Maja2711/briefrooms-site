name: Update Hot X Topics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/build_hot_x_en.py"
      - "scripts/update_hot_x_topics.py"
      - "scripts/translate_hot_x_pl.py"
      - "scripts/hot_x_post_guard.py"
      - ".github/workflows/hot-x-topics.yml"

permissions:
  contents: write

jobs:
  update-hot-x-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update Hot X topics from news and X search links
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_MODEL: gpt-4o-mini
        run: python scripts/build_hot_x_en.py

      - name: Final PL language gate for Hot X
        run: python scripts/translate_hot_x_pl.py

      - name: Apply Hot X summary and clean X search links
        run: python scripts/hot_x_post_guard.py

      - name: Commit Hot X topics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hot_tweets.json .cache || true
          if git diff --cached --quiet; then
            echo "No Hot X changes"
          else
            git commit -m "Update Hot X topics"
            git pull --rebase origin main
            git push
          fi
