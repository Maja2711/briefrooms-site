name: Build homepage brief

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/build_home_brief_pl.py"
      - "scripts/build_home_brief_en.py"
      - "scripts/read_and_summarize_articles.py"
      - "scripts/comment_quality.py"
      - "scripts/enforce_brief_length.py"
      - "scripts/remove_urgent_badge_categories.py"
      - "scripts/validate_brief_quality.py"
      - "scripts/dedupe_home_brief_stories.py"
      - "scripts/hide_urgent_home_labels.py"
      - "scripts/patch_brief_comment_source.py"
      - "scripts/protect_home_feed.py"
      - "scripts/generate_permanent_briefs.py"
      - "scripts/home-briefs.js"
      - "tests/test_comment_quality.py"
      - "tests/test_permanent_briefs.py"
      - "tests/test_homepage_static.py"
      - "tests/test_home_briefs.js"
      - ".github/workflows/build-home-brief.yml"
  schedule:
    # Six times daily, offset from the PL (:10) and EN (:40) AI news windows.
    - cron: "55 1,5,9,13,17,21 * * *"

permissions:
  contents: write
  models: read

concurrency:
  group: content-publishing
  cancel-in-progress: false

jobs:
  build-home-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest main before generation
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip feedparser requests

      - name: Test PL and EN comment quality contract
        run: python -m unittest discover -s tests -p "test_comment_quality.py"

      - name: Test permanent brief archive
        run: python -m unittest discover -s tests -p "test_permanent_briefs.py"

      - name: Test static homepage briefs and resilient browser refresh
        run: |
          python -m unittest discover -s tests -p "test_homepage_static.py"
          node --test tests/test_home_briefs.js

      - name: Save last known good homepage feeds
        run: python scripts/protect_home_feed.py --backup
        continue-on-error: true

      - name: Build Polish homepage brief JSON
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_MODEL: gpt-4o-mini
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: openai/gpt-4o-mini
          GITHUB_MODELS_REVIEW_MODEL: openai/gpt-4.1-mini
          GITHUB_MODELS_MIN_INTERVAL_SECONDS: "4.2"
        run: python scripts/build_home_brief_pl.py
        continue-on-error: true

      - name: Build English homepage brief JSON
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_MODEL: gpt-4o-mini
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: openai/gpt-4o-mini
          GITHUB_MODELS_REVIEW_MODEL: openai/gpt-4.1-mini
          GITHUB_MODELS_MIN_INTERVAL_SECONDS: "4.2"
        run: python scripts/build_home_brief_en.py
        continue-on-error: true

      - name: Read source articles and summarise meaning
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_MODEL: gpt-4o-mini
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: openai/gpt-4o-mini
          GITHUB_MODELS_REVIEW_MODEL: openai/gpt-4.1-mini
          GITHUB_MODELS_MIN_INTERVAL_SECONDS: "4.2"
        run: python scripts/read_and_summarize_articles.py

      - name: Enforce article brief methodology
        run: python scripts/enforce_brief_length.py

      - name: Remove visible urgent badge categories
        run: python scripts/remove_urgent_badge_categories.py

      - name: Final comment quality gate
        run: python scripts/validate_brief_quality.py

      - name: Final same-story dedupe gate
        run: python scripts/dedupe_home_brief_stories.py

      - name: Patch homepage renderers
        run: python scripts/hide_urgent_home_labels.py

      - name: Keep one approved comment source
        run: python scripts/patch_brief_comment_source.py

      - name: Restore or complete last-good homepage feeds
        if: always()
        run: python scripts/protect_home_feed.py --validate

      - name: Generate permanent brief archive
        run: python scripts/generate_permanent_briefs.py

      - name: Commit updated homepage brief data
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main:refs/remotes/origin/main
          if ! git diff --quiet HEAD..origin/main -- .github/workflows/build-home-brief.yml config/workflow_templates/build-home-brief.yml scripts/build_home_brief_pl.py scripts/build_home_brief_en.py scripts/read_and_summarize_articles.py scripts/comment_quality.py scripts/enforce_brief_length.py scripts/remove_urgent_badge_categories.py scripts/validate_brief_quality.py scripts/dedupe_home_brief_stories.py scripts/hide_urgent_home_labels.py scripts/patch_brief_comment_source.py scripts/protect_home_feed.py scripts/generate_permanent_briefs.py scripts/home-briefs.js tests/test_comment_quality.py tests/test_permanent_briefs.py tests/test_homepage_static.py tests/test_home_briefs.js; then
            echo "Skip stale publish because generator code changed on main."
            exit 0
          fi
          git add pl/home_brief.json en/home_brief.json pl/index.html en/index.html pl/brief.html en/brief.html pl/briefy en/briefs data/permanent_briefs_pl.json data/permanent_briefs_en.json sitemap.xml .cache || true
          if git diff --cached --quiet; then
            echo "No homepage brief changes to commit."
          else
            git commit -m "Update homepage live brief data"
            # During rebase, "theirs" is this newer generated commit; keep it on same-file conflicts.
            git pull --rebase -X theirs origin main
            git push
          fi
