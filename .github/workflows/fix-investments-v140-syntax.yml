name: Fix Investments v1.4.0 Syntax

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/fix_investments_v140_syntax.py"
      - ".github/workflows/fix-investments-v140-syntax.yml"

permissions:
  contents: write

jobs:
  fix-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fix syntax
        run: python scripts/fix_investments_v140_syntax.py
      - name: Check syntax
        run: python -m py_compile scripts/investments_weekly.py scripts/investments_thresholds.py scripts/investments_monitor.py scripts/investments_risk_learning.py
      - name: Commit syntax fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/investments_weekly.py scripts/apply_investments_v140.py
          if git diff --cached --quiet; then
            echo "No syntax changes."
          else
            git commit -m "Fix investment methodology v1.4.0 syntax"
            git pull --rebase origin main
            git push
          fi
