name: Dispatch PL thumbnails

on:
  push:
    branches: [main]
    paths:
      - "triggers/pl-thumbnails-dispatch.txt"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch thumbnail patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run news-pl-thumbnails.yml
