name: Accelerate BRACE Historical Learning

on:
  workflow_dispatch: {}
  schedule:
    # Runs after the standard Sunday BRACE review.
    - cron: "20 8 * * 0"
  push:
    branches: [main]
    paths:
      - "scripts/brace_historical_accelerator.py"
      - "scripts/brace_historical_seed_calibration.py"
      - "scripts/brace_historical_publish.py"
      - "tests/test_brace_historical_accelerator.py"
      - "tests/test_brace_historical_seed_calibration.py"
      - ".github/workflows/brace-historical-accelerator.yml"

permissions:
  contents: write

concurrency:
  group: brace-historical-accelerator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  train-validate-and-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip yfinance pandas numpy pytest

      - name: Validate accelerator and BRACE suite
        run: |
          python -m py_compile scripts/brace_historical_accelerator.py scripts/brace_historical_seed_calibration.py scripts/brace_historical_publish.py
          python -m pytest -q tests/test_brace_historical_accelerator.py tests/test_brace_historical_seed_calibration.py tests/test_portfolio_10k_brace*.py

      - name: Train on the longest honest price history
        run: python scripts/brace_historical_accelerator.py --start 1995-01-01 --patience 6

      - name: Calibrate lessons to validated strength
        run: python scripts/brace_historical_seed_calibration.py

      - name: Rebuild current BRACE snapshot
        run: python scripts/portfolio_10k_brace.py

      - name: Apply historical seed and live adaptive learning
        run: python scripts/portfolio_10k_brace_learning_runtime.py

      - name: Publish historical-learning audit state
        run: python scripts/brace_historical_publish.py

      - name: Refresh no-look-ahead BRACE-Lite backtest
        run: python scripts/portfolio_10k_brace_backtest.py

      - name: Recheck champion-challenger promotion gate
        run: python scripts/portfolio_10k_brace_promotion.py

      - name: Commit trained memory and transparent outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/investments/portfolio_10k_brace_historical_learning.json \
            data/investments/portfolio_10k_brace_memory.json \
            data/investments/portfolio_10k_brace.json \
            data/investments/portfolio_10k_brace_backtest.json
          if git diff --cached --quiet; then
            echo "BRACE historical learning outputs already current."
          else
            git commit -m "Train BRACE on guarded historical lessons"
            git pull --rebase origin main
            git push
          fi
