name: Apply Geopolitics Article Unification

on:
  push:
    branches: [fix/geo-books-unified]
    paths:
      - "assets/geo-article-unified.css"
      - "assets/geo-article-unified.js"
      - "scripts/apply_geo_article_unification.py"
      - "tests/test_geo_article_unification.py"
      - ".github/workflows/apply-geo-article-unification.yml"

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/geo-books-unified

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply shared assets to every PL and EN geopolitics book
        run: python scripts/apply_geo_article_unification.py

      - name: Validate pages and JavaScript
        run: |
          python -m unittest tests/test_geo_article_unification.py
          node --check assets/geo-article-unified.js

      - name: Commit generated HTML changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pl/geo en/geo
          if git diff --cached --quiet; then
            echo "Geopolitics pages already unified."
          else
            git commit -m "Apply unified presentation to geopolitics books"
            git push origin fix/geo-books-unified
          fi
