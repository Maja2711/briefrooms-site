name: Patch homepage AI badge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/patch_ai_badge.py"
      - ".github/workflows/patch-ai-badge.yml"

permissions:
  contents: write

jobs:
  patch-ai-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Patch homepage AI badge
        run: python scripts/patch_ai_badge.py
      - name: Commit homepage AI badge patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pl/index.html en/index.html
          if git diff --cached --quiet; then
            echo "No homepage AI badge changes."
          else
            git commit -m "Make homepage AI badge collapsible"
            git push
          fi
