name: Apply Weekly V5 Governance Patch

on:
  push:
    branches: [main]
    paths:
      - "scripts/apply_weekly_v5_patch.py"
      - ".github/workflows/apply-weekly-v5-patch.yml"

permissions:
  contents: write

concurrency:
  group: weekly-v5-governance-patch
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand weekly v5 implementation
        run: python scripts/apply_weekly_v5_patch.py

      - name: Commit implementation immediately
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add governed weekly model v5"
          git pull --rebase origin main
          git push
