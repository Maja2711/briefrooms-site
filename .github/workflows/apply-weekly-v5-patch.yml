name: Apply Weekly V5 Governance Patch

on:
  push:
    branches: [main]
    paths:
      - "scripts/apply_weekly_v5_patch.py"
      - ".github/workflows/apply-weekly-v5-patch.yml"

permissions:
  contents: write

concurrency:
  group: weekly-v5-governance-patch
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Expand governed weekly model patch
        run: python scripts/apply_weekly_v5_patch.py

      - name: Install test dependencies
        run: python -m pip install --upgrade pip yfinance pandas numpy

      - name: Compile Python modules
        run: |
          python -m py_compile scripts/investments_weekly_v5.py
          python -m py_compile scripts/backtest_weekly_execution_parity_v5.py
          python -m py_compile scripts/apply_instrument_validation_gate.py
          python -m py_compile scripts/render_weekly_public_pages.py

      - name: Run governed weekly tests
        run: |
          python -m unittest tests/test_investments_weekly_v4.py
          python -m unittest tests/test_investments_weekly_v5.py
          node --check scripts/investments-weekly-public.js
          node --test tests/test_investments_weekly_public.js

      - name: Verify Polish and English page generation
        run: |
          python scripts/render_simple_investments.py
          grep -q "NO_TRADE" pl/inwestycje/prognozy-tygodniowe.html
          grep -q "NO_TRADE" en/investing/weekly-forecasts.html

      - name: Commit verified implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add governed weekly model v5" || exit 0
          git pull --rebase origin main
          git push
