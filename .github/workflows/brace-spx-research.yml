name: BRACE-SPX Research Lab

on:
  workflow_dispatch:
    inputs:
      budget:
        description: "Number of new candidates to evaluate"
        required: false
        default: "18"
  schedule:
    # Two research cycles per day. Research outputs never activate live orders.
    - cron: "17 2,14 * * *"
  push:
    branches:
      - brace-spx-research
    paths:
      - "scripts/brace_spx_research.py"
      - "tests/test_brace_spx_research.py"
      - "research/brace-spx/README.md"
      - ".github/workflows/brace-spx-research.yml"

permissions:
  contents: write

concurrency:
  group: brace-spx-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out research branch
        uses: actions/checkout@v4
        with:
          ref: brace-spx-research

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install research dependencies
        run: python -m pip install --upgrade pip numpy pandas yfinance scikit-learn pytest

      - name: Validate BRACE-SPX laboratory
        run: |
          python -m py_compile scripts/brace_spx_research.py
          python -m pytest -q tests/test_brace_spx_research.py

      - name: Run bounded champion-challenger search
        env:
          BUDGET: ${{ github.event.inputs.budget || '18' }}
        run: python scripts/brace_spx_research.py --start 1993-01-01 --budget "$BUDGET"

      - name: Upload research evidence
        uses: actions/upload-artifact@v4
        with:
          name: brace-spx-research-output
          retention-days: 30
          if-no-files-found: error
          path: |
            data/research/brace_spx_research.json
            data/research/brace_spx_experiments.json

      - name: Persist experiment memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/brace_spx_research.json data/research/brace_spx_experiments.json
          if git diff --cached --quiet; then
            echo "No new BRACE-SPX experiments."
          else
            git commit -m "Research BRACE-SPX champion candidates"
            git pull --rebase origin brace-spx-research
            git push origin HEAD:brace-spx-research
          fi
