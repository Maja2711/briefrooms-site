name: BRACE-SPX Research Lab

on:
  workflow_dispatch:
    inputs:
      budget:
        description: "Number of new candidates to evaluate"
        required: false
        default: "36"
  schedule:
    # One bounded research cycle per hour. Research outputs never activate live orders.
    - cron: "17 * * * *"
  push:
    branches:
      - brace-spx-research
    paths:
      - "scripts/brace_spx_research.py"
      - "scripts/brace_spx_generation_research.py"
      - "scripts/brace_spx_research_controls.py"
      - "scripts/brace_spx_macro_events.py"
      - "scripts/brace_spx_selection_audit.py"
      - "scripts/brace_spx_statistical_governance.py"
      - "tests/test_brace_spx_research.py"
      - "tests/test_brace_spx_generation_research.py"
      - "tests/test_brace_spx_research_controls.py"
      - "tests/test_brace_spx_macro_events.py"
      - "tests/test_brace_spx_selection_audit.py"
      - "tests/test_brace_spx_statistical_governance.py"
      - "research/brace-spx/README.md"
      - ".github/workflows/brace-spx-research.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/brace_spx_research.py"
      - "scripts/brace_spx_generation_research.py"
      - "scripts/brace_spx_research_controls.py"
      - "scripts/brace_spx_macro_events.py"
      - "scripts/brace_spx_selection_audit.py"
      - "scripts/brace_spx_statistical_governance.py"
      - "tests/test_brace_spx_research.py"
      - "tests/test_brace_spx_generation_research.py"
      - "tests/test_brace_spx_research_controls.py"
      - "tests/test_brace_spx_macro_events.py"
      - "tests/test_brace_spx_selection_audit.py"
      - "tests/test_brace_spx_statistical_governance.py"
      - "research/brace-spx/README.md"
      - ".github/workflows/brace-spx-research.yml"

permissions:
  contents: write

concurrency:
  group: brace-spx-research-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out research branch
        uses: actions/checkout@v4
        with:
          ref: brace-spx-research
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install research dependencies
        run: python -m pip install --upgrade pip numpy pandas yfinance scikit-learn pytest

      - name: Validate BRACE-SPX laboratory
        run: |
          python -m py_compile \
            scripts/brace_spx_research.py \
            scripts/brace_spx_generation_research.py \
            scripts/brace_spx_research_controls.py \
            scripts/brace_spx_macro_events.py \
            scripts/brace_spx_selection_audit.py \
            scripts/brace_spx_statistical_governance.py
          python -m pytest -q \
            tests/test_brace_spx_research.py \
            tests/test_brace_spx_generation_research.py \
            tests/test_brace_spx_research_controls.py \
            tests/test_brace_spx_macro_events.py \
            tests/test_brace_spx_selection_audit.py \
            tests/test_brace_spx_statistical_governance.py

      - name: Run sealed generation search
        env:
          BUDGET: ${{ github.event.inputs.budget || '36' }}
        run: python scripts/brace_spx_generation_research.py --start 1993-01-01 --budget "$BUDGET"

      - name: Run hypothesis-agnostic selection audit
        run: python scripts/brace_spx_selection_audit.py

      - name: Reconcile active evidence with verified public snapshot
        run: |
          python scripts/brace_spx_statistical_governance.py \
            --active-report data/research/brace_spx_generation_research.json \
            --public-snapshot data/public/brace_spx_public.json \
            --output data/research/brace_spx_reconciliation.json

      - name: Upload research evidence
        uses: actions/upload-artifact@v4
        with:
          name: brace-spx-sealed-generation-output
          retention-days: 30
          if-no-files-found: error
          path: |
            data/research/brace_spx_generation_research.json
            data/research/brace_spx_generation_experiments.json
            data/research/brace_spx_generation_manifest.json
            data/research/brace_spx_selection_audit.json
            data/research/brace_spx_reconciliation.json

      - name: Persist experiment memory
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/research/brace_spx_generation_research.json \
            data/research/brace_spx_generation_experiments.json \
            data/research/brace_spx_generation_manifest.json \
            data/research/brace_spx_selection_audit.json \
            data/research/brace_spx_reconciliation.json
          if git diff --cached --quiet; then
            echo "No new BRACE-SPX sealed-generation evidence."
          else
            git commit -m "Research BRACE-SPX sealed generation"
            git pull --rebase origin brace-spx-research
            git push origin HEAD:brace-spx-research
          fi
