name: Patch About AI copy once

on:
  push:
    branches: [main]
    paths:
      - "scripts/patch_about_ai_copy_once.py"
      - ".github/workflows/patch-about-ai-copy-once.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply copy cleanup
        run: python scripts/patch_about_ai_copy_once.py

      - name: Commit updated About pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pl/o-projekcie.html en/about.html
          if git diff --cached --quiet; then
            echo "About AI copy already clean."
          else
            git commit -m "copy(about): keep AI section concise"
            git pull --rebase origin main
            git push
          fi
