name: Daily Market Alert

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - open
          - preclose
          - ui-only
  push:
    branches: [main]
    paths:
      - "scripts/update_daily_market_alert.py"
      - "scripts/patch_daily_alert_ui.py"
      - "tests/test_daily_market_alert.py"
      - ".github/workflows/daily-market-alert.yml"
  schedule:
    # Candidate UTC times for 09:45 New York, across EDT/EST.
    - cron: "45 13 * * 1-5"
    - cron: "45 14 * * 1-5"
    # Candidate UTC times for one hour before a 13:00 ET shortened session close.
    - cron: "0 16 * * 1-5"
    - cron: "0 17 * * 1-5"
    # Candidate UTC times for one hour before the normal 16:00 ET close.
    - cron: "0 19 * * 1-5"
    - cron: "0 20 * * 1-5"

permissions:
  contents: write
  models: read

concurrency:
  group: daily-market-alert
  cancel-in-progress: false

jobs:
  build-daily-market-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install governed alert dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser pandas_market_calendars

      - name: Test daily alert contract
        run: python -m unittest tests.test_daily_market_alert -v

      - name: Patch Daily Market Alert interface
        run: python scripts/patch_daily_alert_ui.py

      - name: Resolve run mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            MODE="ui-only"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ inputs.mode }}"
          else
            MODE="auto"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $MODE"

      - name: Generate or check Daily Market Alert
        if: steps.mode.outputs.mode != 'ui-only'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_MODEL: gpt-4o-mini
          NEWS_AI_REVIEW_MODEL: gpt-4.1-mini
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: openai/gpt-4o-mini
          GITHUB_MODELS_REVIEW_MODEL: openai/gpt-4.1-mini
          GITHUB_MODELS_MIN_INTERVAL_SECONDS: "4.2"
        run: python scripts/update_daily_market_alert.py --mode "${{ steps.mode.outputs.mode }}"

      - name: Validate generated alert
        if: steps.mode.outputs.mode != 'ui-only'
        run: |
          if [[ -f data/investments/daily_market_alert.json ]] && grep -q '"schema_version": "2.0"' data/investments/daily_market_alert.json; then
            python scripts/update_daily_market_alert.py --validate-only
          else
            echo "No schema 2.0 alert was generated in this run."
          fi

      - name: Commit interface or alert updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/site-header.js pl/inwestycje.html en/investing.html
          git add data/investments/daily_market_alert.json data/investments/daily_alert_history 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No Daily Market Alert changes to commit."
          else
            git commit -m "Update Daily Market Alert"
            git pull --rebase -X theirs origin main
            git push
          fi
