name: Deploy production from main

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Self-healing fallback for commits created by automation tokens.
    - cron: "27 */2 * * *"
  workflow_run:
    workflows:
      - "Build homepage brief"
      - "Build PL Aktualności (6x dziennie)"
      - "Build EN News (6x daily)"
      - "Update Hot X Topics"
      - "Refresh Portfolio 10K Hourly Prices"
      - "Build Governed Investments Weekly Forecasts"
      - "Update Investment Room Quotes"
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: briefrooms-production-pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Validate static homepage contract
        run: python -m unittest discover -s tests -p "test_homepage_static.py"

      - name: Build clean production artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.cache/' \
            --exclude='_site/' \
            --exclude='config/' \
            --exclude='tests/' \
            --exclude='scripts/*.py' \
            --exclude='scripts/__pycache__/' \
            --exclude='README*' \
            --exclude='.gitignore' \
            --exclude='requirements*.txt' \
            --exclude='package*.json'

          test -f _site/CNAME
          test -f _site/pl/index.html
          test -f _site/en/index.html
          grep -q '<!-- HOME_BRIEFS_START -->' _site/pl/index.html
          grep -q '<!-- HOME_BRIEFS_START -->' _site/en/index.html

          DEPLOYED_SHA="$(git rev-parse HEAD)"
          DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > _site/build-version.json <<EOF
          {
            "repository": "Maja2711/briefrooms-site",
            "branch": "main",
            "sha": "${DEPLOYED_SHA}",
            "deployed_at": "${DEPLOYED_AT}"
          }
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy exact main artifact
        id: deployment
        uses: actions/deploy-pages@v4
