name: Deploy production from main

on:
  push:
    branches: [main]
  workflow_dispatch:
  issues:
    types: [opened]
  schedule:
    # Self-healing fallback for commits created by automation tokens.
    - cron: "27 */2 * * *"
  workflow_run:
    workflows:
      - "Build homepage brief"
      - "Build PL Aktualności (6x dziennie)"
      - "Build EN News (6x daily)"
      - "Update Hot X Topics"
      - "Refresh Portfolio 10K Hourly Prices"
      - "Build Governed Investments Weekly Forecasts"
      - "Update Investment Room Quotes"
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: briefrooms-production-pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      (github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success') &&
      (github.event_name != 'issues' ||
      github.event.issue.title == 'Trigger BriefRooms production parity')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      artifact_sha: ${{ steps.artifact.outputs.sha }}
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Record controlled trigger
        if: github.event_name == 'issues'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          cat > data/production_deployment_trigger.json <<EOF
          {
            "event": "issues.opened",
            "issue": ${GITHUB_EVENT_ISSUE_NUMBER},
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "triggered_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/production_deployment_trigger.json
          git commit -m "Record production deployment trigger"
          git pull --rebase origin main
          git push
        env:
          GITHUB_EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Validate static homepage contract
        run: python -m unittest discover -s tests -p "test_homepage_static.py"

      - name: Build clean production artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.cache/' \
            --exclude='_site/' \
            --exclude='config/' \
            --exclude='tests/' \
            --exclude='scripts/*.py' \
            --exclude='scripts/__pycache__/' \
            --exclude='README*' \
            --exclude='.gitignore' \
            --exclude='requirements*.txt' \
            --exclude='package*.json'

          test -f _site/CNAME
          test -f _site/pl/index.html
          test -f _site/en/index.html
          grep -q '<!-- HOME_BRIEFS_START -->' _site/pl/index.html
          grep -q '<!-- HOME_BRIEFS_START -->' _site/en/index.html

          DEPLOYED_SHA="$(git rev-parse HEAD)"
          DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "sha=${DEPLOYED_SHA}" >> "$GITHUB_OUTPUT"
          cat > _site/build-version.json <<EOF
          {
            "repository": "Maja2711/briefrooms-site",
            "branch": "main",
            "sha": "${DEPLOYED_SHA}",
            "deployed_at": "${DEPLOYED_AT}"
          }
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy exact main artifact
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout production verifier
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Verify production SHA and static homepage cards
        env:
          EXPECTED_SHA: ${{ needs.build.outputs.artifact_sha }}
        run: >-
          python scripts/verify_production.py
          --expected-sha "$EXPECTED_SHA"
          --base-url https://briefrooms.com
