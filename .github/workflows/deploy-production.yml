name: Deploy production from main

on:
  push:
    branches: [main]
  workflow_dispatch:
  issues:
    types: [opened]
  schedule:
    - cron: "27 */2 * * *"
  workflow_run:
    workflows:
      - "Build homepage brief"
      - "Build PL Aktualności (6x dziennie)"
      - "Build EN News (6x daily)"
      - "Update Hot X Topics"
      - "Refresh Portfolio 10K Hourly Prices"
      - "Build Governed Investments Weekly Forecasts"
      - "Update Investment Room Quotes"
    types: [completed]

permissions:
  contents: read
  pages: write

concurrency:
  group: briefrooms-production-pages
  cancel-in-progress: false

jobs:
  deploy-and-verify:
    if: >-
      (github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success') &&
      (github.event_name != 'issues' ||
      github.event.issue.title == 'Trigger BriefRooms production parity')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Validate static homepage contract
        run: python -m unittest discover -s tests -p "test_homepage_static.py"

      - name: Confirm actual Pages publishing source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            > /tmp/pages.json
          python - <<'PY'
          import json
          from pathlib import Path

          pages = json.loads(Path('/tmp/pages.json').read_text())
          source = pages.get('source') or {}
          actual = (pages.get('build_type'), source.get('branch'), source.get('path'))
          expected = ('legacy', 'main', '/')
          if actual != expected:
              raise SystemExit(
                  f'Unexpected GitHub Pages source {actual!r}; expected {expected!r}'
              )
          print('GitHub Pages source is legacy main/.')
          PY

      - name: Request build from latest main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          http_code="$(curl --silent --show-error \
            --output /tmp/pages-build.json \
            --write-out '%{http_code}' \
            -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds")"
          cat /tmp/pages-build.json || true
          case "$http_code" in
            201) echo 'Queued a fresh GitHub Pages build.' ;;
            409) echo 'A GitHub Pages build is already running; verifying that build.' ;;
            *) echo "Unexpected Pages build response: HTTP ${http_code}" >&2; exit 1 ;;
          esac

      - name: Verify production equals current main
        shell: bash
        run: >-
          python scripts/verify_production.py
          --expected-sha "$(git rev-parse HEAD)"
          --base-url https://briefrooms.com
          --attempts 36
          --interval 10
          --timeout 20
