name: Apply Investments Methodology v1.4.0

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/apply_investments_v140.py"
      - ".github/workflows/apply-investments-v140.yml"

permissions:
  contents: write

jobs:
  apply-v140:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply methodology v1.4.0
        run: python scripts/apply_investments_v140.py
      - name: Commit methodology v1.4.0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/methodology.json scripts/investments_weekly.py scripts/investments_thresholds.py scripts/investments_monitor.py scripts/investments_risk_learning.py
          if git diff --cached --quiet; then
            echo "No v1.4.0 changes."
          else
            git commit -m "Apply investment methodology v1.4.0"
            git pull --rebase origin main
            git push
          fi
