name: Refresh Portfolio 10K Hourly Prices

on:
  workflow_dispatch:
  schedule:
    # Covers European and US cash sessions throughout DST changes.
    - cron: "11 6-21 * * 1-5"
  push:
    branches: [main]
    paths:
      - "scripts/portfolio_10k_hourly_prices.py"
      - "scripts/portfolio-10k-public.js"
      - "pl/inwestycje/portfel-10k.html"
      - "en/investing/portfolio-10k.html"
      - ".github/workflows/portfolio-10k-hourly-prices.yml"

permissions:
  contents: write

concurrency:
  group: portfolio-10k-automation
  cancel-in-progress: false

jobs:
  refresh-hourly-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quote dependencies
        run: python -m pip install --upgrade pip yfinance pandas

      - name: Refresh current prices and portfolio valuation
        run: python scripts/portfolio_10k_hourly_prices.py

      - name: Validate accounting consistency
        run: python scripts/validate_portfolio_10k_state.py

      - name: Validate public JavaScript
        run: node --check scripts/portfolio-10k-public.js

      - name: Commit hourly valuation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/portfolio_10k.json
          if git diff --cached --quiet; then
            echo "No hourly valuation change to commit."
          else
            git commit -m "Refresh Portfolio 10K current prices"
            git pull --rebase origin main
            git push
          fi
