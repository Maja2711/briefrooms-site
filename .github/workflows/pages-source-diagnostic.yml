name: Diagnose GitHub Pages source

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  pages: read

jobs:
  diagnose:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.issue.title == 'Diagnose BriefRooms Pages source'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Read actual GitHub Pages configuration
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p data
          curl --fail-with-body --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            > data/pages_source_diagnostic.json
          python -m json.tool data/pages_source_diagnostic.json

      - name: Publish diagnostic result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/pages_source_diagnostic.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Record GitHub Pages source configuration'
          git pull --rebase origin main
          git push
