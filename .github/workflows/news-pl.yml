name: Build PL Aktualności (12x dziennie)

on:
  schedule:
    # czasy w UTC — co 2 godziny = 12x dziennie
    - cron: "10 */2 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/fetch_news_pl.py"
      - "scripts/fetch_news_pl_hybrid.py"
      - "scripts/fetch_news_pl_deep.py"
      - ".github/workflows/news-pl.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser python-dateutil requests

      - name: Generate PL Aktualności (deep contextual PL content + hotbar JSON)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_MODEL: gpt-4o-mini
        run: |
          python scripts/fetch_news_pl_deep.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Dodaj tylko to, co faktycznie istnieje. Brak pliku cache nie może wywalać workflow.
          git add -A pl/aktualnosci.html .cache || true

          if git diff --cached --quiet; then
            echo "No PL news changes to commit."
          else
            git commit -m "chore(news-pl): update deep contextual PL news"
            # Zabezpieczenie przed odrzuceniem push, gdy main zmienił się w międzyczasie.
            git pull --rebase origin main
            git push
          fi
