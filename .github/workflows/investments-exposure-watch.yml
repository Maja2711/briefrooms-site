name: Continuous Weekly Paper Exposure Watch

on:
  workflow_dispatch:
  schedule:
    # Lightweight monitoring every 15 minutes on trading days.
    - cron: "*/15 * * * 1-5"
  push:
    branches: [main]
    paths:
      - "scripts/investments_weekly_v4.py"
      - "scripts/investments_weekly_v4_cli.py"
      - "scripts/ensure_current_week_forecast.py"
      - "scripts/daily_position_review.py"
      - "data/investments/multi_instrument_exposure_policy.json"
      - ".github/workflows/investments-exposure-watch.yml"

permissions:
  contents: write

concurrency:
  group: investments-paper-publishing
  cancel-in-progress: false

jobs:
  monitor-continuous-exposure:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install market data dependency
        run: python -m pip install --upgrade pip yfinance pandas numpy

      - name: Recover a missing current-week paper forecast
        run: python scripts/ensure_current_week_forecast.py

      - name: Check SL TP and maintain all weekly paper positions
        run: python scripts/investments_weekly_v4_cli.py --mode close

      - name: Process scheduled or material-event thesis review
        run: python scripts/daily_position_review.py

      - name: Re-enter every instrument after a close during the active weekly window
        run: python scripts/investments_weekly_v4_cli.py --mode ensure-exposure

      - name: Render public investment pages
        run: python scripts/render_simple_investments.py

      - name: Commit paper-position updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/investments/live_prices.json data/investments/weekly data/investments/daily_review_report.json data/investments/event_exit_requests.json data/investments/multi_instrument_exposure_state.json data/investments/multi_instrument_exposure_report.json pl/inwestycje/prognozy-tygodniowe.html en/investing/weekly-forecasts.html
          if git diff --cached --quiet; then
            echo "No continuous exposure changes to commit."
          else
            git commit -m "Maintain all weekly paper positions"
            git pull --rebase origin main
            git push
          fi
